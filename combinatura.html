<h2>How to play</h2>
<p>${KB("click")} on pairs of elements to tentatively combine them into new ones.</p>

<h3>Goals</h3>
<p>You choose your own goal when playing ${v.TITLE_BOLD()}. Here are some suggestions:</p>
<ul>
	<li><b>Find all</b> <span id="CardCounter">161</span> natural phenomena;</li>
	<li><b>Explore</b> a virtual world of natural possibility and discover concepts that never before crossed your mind;</li>
	<li><b>Learn</b> a new language, or widen your vocabulary while having fun;</li>
	<li><b>Relax</b> in the world of ${v.TITLE_BOLD()}.</li>
</ul>

<h3>Language choices</h3>
<p>Play ${v.TITLE_BOLD()} in <b>up to three languages</b> together to widen your vocabulary by visual association, or enter into <b>Zen mode</b>, for a relaxing challenge, unencumbered by words.</p>
<p>To add or remove a language, press:</p>
<ul>
<li><kbd>Alt</kbd>/<kbd>Shift</kbd>+<kbd>D</kbd> - Deutsch</li>
<li><kbd>Alt</kbd>/<kbd>Shift</kbd>+<kbd>E</kbd> - English</li>
<li><kbd>Alt</kbd>/<kbd>Shift</kbd>+<kbd>F</kbd> - Français</li>
<li><kbd>Alt</kbd>/<kbd>Shift</kbd>+<kbd>P</kbd> - Português</li>
</ul>
<p>Pressing <kbd>Z</kbd> will toggle <b>Zen mode</b>.</p>

<h3>Inspiration</h3>
<p>${v.TITLE_BOLD()} was inspired by alchemy-style games such as <em>Doodle God</em> or <em>Little Alchemy</em>, but eschews the traditional <em>Earth, Fire, Water, Air</em> tetrad in favour of a fresher start with modern elements.</p>

<h2>Project roadmap</h2>
<p>${v.TITLE_BOLD()} is currently frozen in <b>alpha stage</b>, as major changes in <em>layout</em> would possible and <em>new cards or languages</em> could be added, but this is no longer in active development. All feedback is ${v.A_WELCOME()}!</p>
