	Keys(YearlyData[year]).map(k=>YearlyData[year][k]=Group(YearlyData[year][k],{YEAR:year}))
}),
Data=Apply(Merge,Values(YearlyData)),
ToolRow=function(name,item){
	var fulllink=name;
	var titleHTML=AHTML(item.title,fulllink);
	var authorHTML=P(item.author);
	var description=item.description;
	var year=item.YEAR;
	var tags=Enumerate(Sort(item.tags).map(CapitalCase));
	return [titleHTML,authorHTML,year,tags,description];
},
ToolsHTML=function(caption,include,exclude){
	var include=ReArray(include).map(LowerSimpleString);
	var exclude=ReArray(exclude).map(LowerSimpleString);
	
	var rows=FilterValuesObject(Data,function(item){
			var tags=item.tags.map(LowerSimpleString);
			return (!include.length||Intersected(tags,include))&&!Intersected(tags,exclude||[])
		});	
		rows=Keys(rows).map(k=>ToolRow(k,rows[k]));
		rows=SortBy(rows,x=>-x[2]);
	return TableHTML({
		caption:caption,
		headers:["Title","Author","Year","Tags","Description"],
		rows:rows})
},""
}

<h2>Purpose</h2>
<p>This is a <em>concise</em> compilation of (puzzlescript) game tools, including useful <b>forks or mods</b>, <b>helpful tools</b> plus an extensive list of <b>Puzzlescript Code Samples</b> for many game components (and even some unfinished games). As a publicly shared, personal reference, it may be updated anytime.</p>
<p><em><b>Latest update:</b> ${StringDateName("2021-02-11")}.</em></p>

<h2>Puzzlescript forks and tools</h2>
<p>Over 100 puzzlescript forks were made since 2013, and some of them are highlighted in the tables below, alongside helpful tools. These cover useful features and language extensions not incorporated yet in the original repository. The engine has also been adapted to create 3D games, and wrapped to run in different environments.</p>

<p><b>NB:</b>${v.NAME()}'s ${A("game bar#bookmarklet")} adds a <em>level selector</em> and a <em>fullscreen mode</em> to any puzzlescript game on the fly, and supports a flexible <em>${A("game bar#hints")} system</em> and a <em>background ${A("game bar#music")}</em> playlist.</p>

<h3>Design tools for levels and mechanics</h3>
<p>Designing good levels and writing puzzlescript rules in more complex situations is a potentially long process. These tools aim to speed that up a bit.</p>
${ToolsHTML("level and rule design tools",["solver","testing","transformer","syntax"])}

<h3>Level selector</h3>
<p>Adding a level selector to a puzzlescript game is a very common wish, for which there are many options, including ${v.NAME()}'s ${A("game bar")}!</p>
${ToolsHTML("adding a level selector",["selector"])}

<h3>Music and sounds</h3>
<p>Sometimes a little extra control over music or sound effects in puzzlescript is desired.</p>
${ToolsHTML("music and sounds",["music","sound"])}
<p>${v.NAME()}'s ${A("game bar")} also supports adding a ${A("game bar#music")} playlist.</p>

<h3>Accessibility and controllers</h3>
<p>Adding a mouse or a gamepad as controllers for a puzzlescript game, and other accessibility-focussed initiatives.</p>
${ToolsHTML("alternative input modes and other accessibility initiatives",["accessibility","mouse","gamepad"])}

<h3>Large level maps</h3>
<p>Making larger games with puzzlescript is regarded by many people as a challenge. In that case, these helpful tools make it less heroic.</p>
${ToolsHTML("making large level maps",["map"])}

<h3>Graphics</h3>
<p>Using larger sprites, adding transparency, changing the default font, or even playing puzzlescript in 3D are possible!</p>
${ToolsHTML("graphical utilities",["sprite","colour","font","3d","convert"])}

<h3>Engines and UIs</h3>
<p>With these engines, puzzlescript can run in different environments, in and out of the browser. There are also some alternative user interfaces.</p>
${ToolsHTML("alternative puzzlescript engines and interfaces",["compiler","ui"])}

<h3>Other helpful tools</h3>
<p>Other useful tools not listed above are gathered here.</p>
${ToolsHTML("other helpful tools",[],["fork","compiler","music","sound","map","selector","testing","sprite","colour","font","3d","accessibility","mouse","convert","gamepad","ui","syntax"])}


<h2>Puzzlescript examples</h2>
<p>All game prototypes not listed in the ${A("puzzlescript-games-database")} are filed in this database, alongside other useful examples of a particular mechanics and game components.</p>
