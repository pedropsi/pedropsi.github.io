<h2>Purpose</h2>
<p>This is a <em>concise</em> compilation of (puzzlescript) game tools, including useful <b>forks or mods</b>, <b>helpful tools</b> plus an extensive list of <b>Puzzlescript Code Samples</b> for many game components (and even some unfinished games). As a publicly shared, personal reference, it may be updated anytime.</p>

<h2>Puzzlescript forks or mods</h2>
<p>Over 100 puzzlescript forks were made since 2013, and some of them are highlighted in the table below. They may include useful features and language extensions not incorporated yet in the original repository. The engine has also been adapted to create 3D games, and wrapped to run in different environments.</p>
<p><b>NB:</b>${v.A_BOOKMARKLET()} adds a <em>level selector</em> and a <em>fullscreen mode</em> to any puzzlescript game on the fly, and supports a flexible <em>hints system</em> and a <em>background music</em> playlist.</p>
