<h2>Purpose</h2>
<p>${v.ONE_LINER()}</p>

<h2>Criteria</h2>
<p>The list focusses on games released within the years <em>2014-${Year()}</em>, yet many during this period were overlooked. As long as they match the <b>criteria</b> below, suggestions are ${v.A_WELCOME()}.</p>
<p>Please be aware that there's a separate list for ${v.A_GAMES()}, as well as games where ${v.NAME()} collaborated (e.g. ${v.A_GOPHERS()}) or was indirectly involved (e.g. ${v.A_ENIGMASH()}).</p>

<h3>Inclusion criteria:</h3>
<p>To be included, a game must score very highly in at least one of these <b>inclusion criteria</b>:</p>
<ul>
	<li><b>Atmosphere:</b> pleasant colours, agreeable music, cool animations;</li>
	<li><b>Challenge:</b> challenging puzzles;</li>
	<li><b>Originality:</b> a distinct style, goal, mechanics or story;</li>
	<li><b>Effort:</b> intense detail, innovative features;</li>
	<li><b>Tradition:</b> faithful ports of old classics.</li>
</ul>

<h3>Exclusion criteria:</h3>
<p>Fatal is the failure to meet at least one the following <b>exclusion criteria</b>:</p>
<ul>
	<li><b>Completeness:</b> not unfinished, not unpolished;</li>
	<li><b>Intuition:</b> lack of awkward controls, lack of visual confusion;</li>
	<li><b>Kinder-friendly:</b> absence of violence and of profanity;</li>
	<li><b>Minimalism:</b> no repetitions, no padding, no unnecessary moves, no wasted time;</li>
	<li><b>Optimism:</b> no negative feelings, at the end of the game;</li>
</ul>


${SelectedGamesHTML()}


<p><em><b>NB:</b> The ${AHTML("puzzlescript-games-database")} lists all puzzlescript games ever made.</em></p>

<h2>FAQ</h2>
${v.LOZ_SYMBOL_TEXT()}

<h3>How is the game list sorted?</h3>
<p>For games published in the most recent year, the most recently added game is on top.</p>
<p>Older games are simply grouped by year and then by author, but without any particular order.</p>

${v.FILTER_TEXT()}
