<h2>Welcome!</h2>
<p>This is the ${v.SITE_NAME()} of ${v.NAME()}'s hobby projects, exposed to the winds of the world, rather than left to dust. These projects were born of a desire to learn and explore, so all but ${AHTML("the most polished","store.html")} are free and open source.</p>
<p>Surpassing expectations, a growing ${AHTML("community of enthusiasts","guestbook.html")} find joy in ${v.NAME()}'s ever-changing ${AHTML("challenges","tag.html?search=puzzle")} and often learn something new!</p>

<h2>Roadmap</h2>

<h3>Future</h3>
<p>Would you collaborate with ${v.NAME()} on a new <em>innovative</em> project? Please ${v.A_LET_ME_KNOW()}!</p>

<h3>Present</h3>
<p>${AHTML("puzzle-type")}, an inductive typing puzzle, is ${v.NAME()}'s current focus, alongside a growing collection of geometric ${AHTML("star-battle")} puzzles, now on 3D!</p>
<p>For more details and updates, check the ${AHTML("news")}.</p>

<h3>Past</h3>
<p>The mini puzzle ${AHTML("unlucky-unlock")} was the starting point for a ${v.A_GAME_JOURNEY()} with peaks at ${AHTML("tiaradventur")}, ${AHTML("gravirinth")} and ${AHTML("burokku-konekuta")}. At the end of the journey, mastering puzzle-making became secondary to helping the ${v.A_PUZZLE_COMMUNITY()} by providing useful ${AHTML("lessons","11-lessons-from-11-games.html")}, ${AHTML("tools","game-tools")} and ${AHTML("templates","platformer-template")}!</p>
<p>Among those, ${v.A_GAME_BAR()} emerged as a collaborative open-source effort to provide puzzlescript <em>developers</em> and <em>players</em> with a better experience, via features such as a level selector, fullscreen, background music and a hint system.</p>
<p>Finally, ${v.NAME()} built the ${AHTML("puzzlescript-games-database")}, a searchable central repository of all ${AHTML("playable","game-console.html")} puzzlescript games, open to contributions from the whole community!</p>
