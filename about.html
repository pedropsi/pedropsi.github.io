<h2>Welcome!</h2>
<p>${v.SITE_NAME()} is an archive of ${v.NAME()}'s personal projects - notably ${v.NAME()}'s puzzles - with a triple purpose: record ${v.NAME()}'s learning journey, make it useful to others and become a stepping stone to something greater. Surpassing all expectations, a growing community of enthusiasts find joy in ${v.NAME()}'s unique challenges and often learn something new.</p>
<p>Most of ${v.NAME()}'s projects are <b>free and open source</b>, yet a few are so polished that they earned a place in the ${v.A_STORE()}!</p>

<h2>History</h2>

<h3>Phase I</h3>
<p>Many years elapsed since ${v.NAME()}'s first hit, the mini puzzle ${v.A_UNLUCKY_UNLOCK()}, and the birth of the ${v.SITE_NAME()}, just before 2018. Fast-forward a year, and five intriguing puzzles (${v.A_WHIRLPUZZLE()}, ${v.A_PMGRP()}, ${v.A_HASTEFULLL()}, ${v.A_TIARADVENTUR()}, ${v.A_ABXTRACT_TRACTX()}), came into being, each a stepping stone for the next project.</p>
<p>${v.NAME()}'s game-making adventure reaches a major milestone in 2019: ${v.NAME()}'s first and probably puzzlescript's first fully commercial game. Enter the ${v.A_GRAVIRINTH()} - a mysteriously puzzling exoarcheology expedition (now available for free).</p>

<h3>Phase II</h3>
<p> As a ${v.A_GAME_JOURNEY()} came to a close, ${v.NAME()}'s goals widened. Mastering puzzle-making became secondary to helping the ${v.A_PUZZLE_COMMUNITY()} by providing useful tools and ${v.A_11_LESSONS()}. Thus was born ${v.A_PLATFORMER_TEMPLATE()}, tripling as a game, game-design tutorial and testing ground for... the ${v.A_GAME_BAR()}!
<p>${v.A_GAME_BAR()} emerged as a collaborative open-source effort to provide puzzlescript <em>developers</em> and <em>players</em> with a better experience, including useful new features such as a level selector, full-screen support, background music manager and a hint system. The game bar was then expanded to non-puzzlescript games, such as ${v.A_PUZZLE_TYPE()}!</p>
<p>Lacking a searchable central repository of all puzzlescript games, ${v.NAME()} decided to make it, and keep it open to contributions from the entire community: enter the ${v.A_PS_DATABASE()}! Plus, as a bonus, most games can be played directly in the ${v.A_GAME_CONSOLE()}.</p>
<p>This being the current focus, making short occasional hits like ${v.A_BUROKKU_KONEKUTA()} or ${v.A_SKILLEBLOKKER()} may nevertheless prove irresistible... </p>
