<h2>Welcome!</h2>
<p>This is the ${v.SITE_NAME()} of ${v.NAME()}'s hobby projects, exposed to the winds of the world instead of left to dust. Born of a desire to learn and explore, all but ${AHTML("the most polished projects","store.html")} are free and open source.</p>
<p>Surpassing expectations, a growing community of enthusiasts find joy in ${v.NAME()}'s everchanging ${AHTML("challenges","tag.html?search=puzzle")} and often learn something new!</p>

<h2>Roadmap</h2>

<h3>Future</h3>
<p>Would you like to collaborate on a new <em>innovative</em> project? Please ${v.A_LET_ME_KNOW()}!</p>

<h3>Present</h3>
<p>${v.NAME()}'s current focus is ${AHTML("puzzle-type")}, an inductive typing puzzle.</p>
<p>A collection of geometric ${AHTML("star-battle")} puzzles, now on 3D, has also been growing!</p>

<h3>Past</h3>
<p>Many years elapsed since ${v.NAME()}'s first hit, the mini puzzle ${AHTML("unlucky-unlock")}, and the birth of the ${v.SITE_NAME()}, just before 2018. Fast-forward two years, and eight intriguing puzzles (${AHTML("whirlpuzzle")}, ${v.A_PMGRP()}, ${AHTML("hastefulll")}, ${AHTML("tiaradventur")}, ${AHTML("abxtract-tractx")}, ${AHTML("gravirinth")}, ${AHTML("burokku-konekuta")} and ${AHTML("skilleblokker")}) came into being.</p>
<p> As this ${v.A_GAME_JOURNEY()} came to a close, ${v.NAME()}'s goals widened. Mastering puzzle-making became secondary to helping the ${v.A_PUZZLE_COMMUNITY()} by providing useful tools and ${v.A_11_LESSONS()}. Thus was born ${AHTML("platformer-template")}, tripling as a game, game-design tutorial and testing ground for... the ${v.A_GAME_BAR()}!
<p>${v.A_GAME_BAR()} emerged as a collaborative open-source effort to provide puzzlescript <em>developers</em> and <em>players</em> with a better experience, including useful new features such as a level selector, full-screen support, background music playlist and a hint system.</p>
<p>Lacking a searchable central repository of all puzzlescript games, ${v.NAME()} decided to make it, and keep it open to contributions from the entire community: enter the ${AHTML("puzzlescript-games-database")}! Plus, as a bonus, most games can be played directly in the ${AHTML("game-console")}.</p>
