<h2>Welcome!</h2>
<p>${v.SITE_NAME()} is an archive of ${v.NAME()}'s personal projects - notably ${v.NAME()}'s puzzles - with a triple purpose: record ${v.NAME()}'s learning journey, make it useful to others and become a stepping stone to something greater. Surpassing all expectations, a growing community of enthusiasts find joy in ${v.NAME()}'s unique challenges and often learn something new.</p>
<p>Most of ${v.NAME()}'s projects are <b>free and open source</b>, yet a few are so polished that they earned a place in the ${v.A_STORE()}!</p>

<h2>History</h2>

<h3>Phase I</h3>
<p>Many years elapsed since ${v.NAME()}'s first hit, the mini puzzle ${AHTML("unlucky-unlock")}, and the birth of the ${v.SITE_NAME()}, just before 2018. Fast-forward a year, and six intriguing puzzles (${AHTML("whirlpuzzle")}, ${v.A_PMGRP()}, ${AHTML("hastefulll")}, ${AHTML("tiaradventur")}, ${AHTML("abxtract-tractx")} and ${AHTML("gravirinth")}), came into being, each a stepping stone for the next project.</p>

<h3>Phase II</h3>
<p> As a ${v.A_GAME_JOURNEY()} came to a close, ${v.NAME()}'s goals widened. Mastering puzzle-making became secondary to helping the ${v.A_PUZZLE_COMMUNITY()} by providing useful tools and ${v.A_11_LESSONS()}. Thus was born ${AHTML("platformer-template")}, tripling as a game, game-design tutorial and testing ground for... the ${v.A_GAME_BAR()}!
<p>${v.A_GAME_BAR()} emerged as a collaborative open-source effort to provide puzzlescript <em>developers</em> and <em>players</em> with a better experience, including useful new features such as a level selector, full-screen support, background music manager and a hint system.</p>
<p>Lacking a searchable central repository of all puzzlescript games, ${v.NAME()} decided to make it, and keep it open to contributions from the entire community: enter the ${AHTML("puzzlescript-games-database")}! Plus, as a bonus, most games can be played directly in the ${AHTML("game-console")}.</p>
<p>Meanwhile, making short occasional hits like ${AHTML("burokku-konekuta")} or ${AHTML("skilleblokker")} proved  irresistible... </p>


<h3>Phase III</h3>
<p>The current focus is ${AHTML("puzzle-type")}, a commercial and cryptic typing puzzle!</p>
<p>Plus, just for fun, a collection of ${AHTML("star-battle")} puzzles in different geometries was also produced!</p>

<h3>Phase IV</h3>
<p> What do you think is coming next? Please ${v.A_LET_ME_KNOW()}!</p>
