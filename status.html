<h2>Purpose</h2>
<p>While ${v.NAME()} conducts frequent tests on the latest versions of the most popular browsers, it is impractical to do it every time a new feature is added, plus the number of platform-device combinations is practically infinite.
As such, it is very likely that your own platform-device combination was never tested before.</p>

<p>Now the <b>good news</b>: by the time you finish reading this sentence, this page will have tested for you, automatically, some key functions. Shall any problems be detected (shown below), you can send them to ${v.NAME()}!</p>

<h2>Problems found?</h2>
<div class="test-suite">Please wait while tests are running...</div> 
${TestReportHTML(),""}

<h2>Code coverage</h2>
<h3>Testable functions</h3>
<p>Current code coverage stands at ${DynamicText("code-coverage")} of all testable functions.</p>
<h4>Functions tested</h4>
<p>${DynamicText("code-coverage-included")}.</p>
<h4>Functions not yet tested</h4>
<p>${DynamicText("code-coverage-excluded")}.</p>

<h3>Untestable functions</h3>
<p>These functions do not return a value, only a side effect, and are not currently testable.</p>
<p>${DynamicText("code-coverage-side")}.</p>


<h2>Dependencies</h2>
<h3>Orphan Functions</h3>
<p>These functions are potentially no longer used (deeper check pending).</p>
<p>${DynamicText("code-orphan-functions")}.</p>
${ButtonHTML({txt:"Retrieve",onclick:`DynamicText("code-orphan-functions",Enumerate(OrphanFunctions()))`})}
