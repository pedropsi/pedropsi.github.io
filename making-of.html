<h2>Methods and Tools</h2>

<h3>Writing</h3>
<p>Most posts are written in ${v.A_VISUAL_STUDIO_CODE()} as mixture of plain text and reusable components, along with some html elements. Longer posts are written in Microsoft Word.</p>

<h3>Visuals</h3>
<h4>Layout</h4>
<p>The ${v.CSS_NAME()} defines the main layout of the ${v.SITE_NAME()}. Pure CSS can be both incredibly powerful and simple, when CSS-variables are used.</p>

<h4>Colour</h4>
<p>The ${v.A_THEME()} also specifies the colour scheme of the ${v.SITE_NAME()}, which is shared by all elements, e.g. the logo, title headings and text, buttons, illustrations, icons, etc...</b>
<p>Most ${v.A_GAMES()}, however, make use of their own scheme, generated by ${v.A_PALLETTON()}. A javascript module was devised to adapt the colours of the ${v.A_GAME_BAR()} to each game, later extended to any game in the ${AHTML("puzzlescript-games-database")}.</p>

<h4>Illustrations</h4>
<p>All illustrations are drawn with Microsoft PowerPoint, at high magnifications, extensively using the alignment and combination of geometric shapes.</p>
<p>While the small colour scheme and the vector simplicity help keep image size low, reducing page load times, illustrations are further compressed with ${v.A_PNGQUANT()} in an automated fashion (part of the CMS pipeline).</p>

<h4>Icons</h4>
<p>Icons such as those in the ${v.A_GAME_BAR()} were also drawn in Microsoft PowerPoint, using a fixed line width, which ensures a consistent look for the collection. They are directly exported as SVGs.</p>
<p>Some icons are directly taken from the ${v.A_UNICODE_TABLE()}, usually after searching by shape on ${v.A_SHAPECATCHER()}.</p>

<h4>Mosaics</h4>
<p>All ${v.A_MOSAICS()} are drawn with Microsoft PowerPoint, inspired by old works of art from around the world.</p>

<h3>Infrastructure</h3>
<h4>Main Content Management</h4>
<p>Unique page content is saved directly in each page's html file, amenable to instant rendering using Javascript templates.</p>
<p>Common content (such as page indices) is organised in a folder of .js files, alongside large or complex lists.</p>

<h4>Content indices</h4>
<p>Certain indices, like the RSS feed, are periodically refreshed using a NODE.JS script, then uploaded to ${v.A_GITHUB()}.</p>
<p>They can also be generated manually in the browser at the ${v.A_GENERATOR()} page.</p>
 
<h3>Audio</h3>
<h4>Composing</h4>
<p>Some sounds were composed in ${v.A_MUSESCORE()}.</p>

<h4>Music search</h4>
<p>${v.A_SOUNDCLOUD_SEARCH()} makes it easy to find high-quality, little known music gems with permissible licenses, used to set the mood in some of ${v.A_GAMES()}.</p>


<h3>Game</h3>
<h4>Engine</h4>
<p>All ${v.A_GAMES()} employ a variety of vanilla Javascript functions, notably those related to the ${v.A_GAME_BAR()}.</p>
<p>Most make use of ${v.A_PUZZLESCRIPT()}.</p>

<h4>Coding</h4>
<p>Among the ${AHTML("game-tools")}, the default ${v.A_PS_EDITOR()} is often used, along with Notepad++ for quicker editing via search and replace.</p>

<h4>Conception</h4>
<p>The ${v.A_WOLFRAM_LANGUAGE()} was used to search for special words for in ${AHTML("puzzle-type")}.</p>

<h4>Trailers</h4>
<p>Game footage was recorded with ${v.A_OBS()}, then edited with ${v.A_SHOTCUT()}.</p>
