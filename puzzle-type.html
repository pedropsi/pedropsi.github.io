<h2>How to play</h2>

<p>The screen displays only one clue. Your goal is to type this clue <em>exactly</em> as shown. However, your keyboard is behaving cryptically...</p>
<p>All puzzles can be solved with logic, experimentation and creative thinking, perhaps even a search engine or pencil and paper. Solving a puzzle usually requires two steps: discovering which rules are in place, then using these rules to write the clue. Rules don't change nor ever rely on timing, so relax and take your time!</p>
<p>Temporary characters, sometimes coloured in a lighter tone, may be transformed when certain conditions be (or fail to be) met.</p>
<p>After beating certain puzzles, some people will enjoy replaying them, trying to push the rules to their limits or using the interface as a learning device. All levels were designed with this possibility in mind.</p>


<h3>Controls - keyboard</h3>
<p>Type any of the 26 uppercase letters of the latin alphabet or any of the 10 digits.</p>
<p> Some levels may forbid certain characters, or allow spaces.</p>

<h4>Undo</h4>
<p>To undo an action, press <kbd>backspace</kbd>, <kbd>delete</kbd> or <kbd>Alt</kbd>+<kbd>Z</kbd>.</p>

<h4>Redo</h4>
<p>To redo, press <kbd>shift</kbd>+<kbd>backspace</kbd>, <kbd>shift</kbd>+<kbd>delete</kbd> or <kbd>Alt</kbd>+<kbd>Y</kbd>.</p>

<h4>On-screen Keyboard</h4>
<p>Press <kbd>Alt</kbd>+<kbd>K</kbd> or <kbd>${ObtainSymbol("keyboard")}</kbd> to open the <b>on-screen keyboard</b>.</p>

<h4>Rarely</h4>
<p>Whenever you see symbols ${ObtainSymbol("left")} and ${ObtainSymbol("right")}, you may press the arrows <kbd>${ObtainSymbol("left")}</kbd> and <kbd>${ObtainSymbol("right")}</kbd>.</p>

<h3>System requirements</h3>
<h4>Browsers</h4>
<h5>Desktop</h5>
<p>${v.TITLE_BOLD()} was tested and runs well with the desktop versions of Chrome (78-81.0), iOS Safari (12) Firefox (65.0-74), Opera (65), Brave (1.5) and Edge (80). ${v.L_OK()}</p>
<p>${v.TITLE_BOLD()} does not run on Internet Explorer.</p>

<h5>Mobile</h5>
<p>Although ${v.TITLE_BOLD()} runs on Android Chrome, Android Firefox and iOS Safari (12), the marked slowness would prevent a good game experience. ${v.L_PROBLEM()}</p>

<h4>Screen sizes</h4>
<p>With a physical keyboard, ${v.TITLE_BOLD()} was designed to display well on all screen sizes, from extremely small (e.g 300px by 200px), to very large (e.g. 1280px by 1024px and above). ${v.L_OK()}</p>
<p>Typing with the on-screen keyboard may be cumbersome on very small screens, because the keys become quite small. So this combination 
is not recommended.</p>

<h3>English language requirements</h3>
<p>Understanding the clue (if in English) is never required, but <em>hintful</em>.</p>
<p>No level requires English knowledge, except MON***. This level involves translating between English and a second language, and so requires either a very basic knowledge of both languages or access to a dictionary!</p>
<p>A few levels require words from specific fields of knowledge, which unfortunately had to be expressed in a particular language (English). However, native and non-native speakers alike are expected to search these words online, unless they happen to be specialists!</p>

<h2>F.A.Q.</h2>

<h3>To which genre does ${v.TITLE_BOLD()} belong?</h3>
<p>To <b>none</b>! ${v.TITLE_BOLD()} is definitely <b>not a riddle game</b>, because it lacks obscure cultural references, <b>nor a word game</b> as it does not reuse a small set of mechanics on endless word lists. Obviously, <b>not a typing game</b> either, since time does not matter and the keyboard deceives!</p>
<p>Perhaps ${v.TITLE_BOLD()} could be placed nearer the <b>puzzle hunt</b> genre, since it can be seen as a collection of puzzles, each with its own character.</p>

<h3>What inspired ${v.TITLE_BOLD()}?</h3>
<p>${v.TITLE_BOLD()} contains mathematical, language, visual, scientific, programming, geographical, musical and other elements.</p>
<p>With respect to other puzzle games, ${v.MINOTALEN()} keenly observed similarities with ${v.A_DEVILS_CALCULATOR()}, while the interface is as minimal as the one found in ${v.A_NONE()}, a riddle game.</p>

<h3>How are puzzles in ${v.TITLE_BOLD()} ordered?</h3>
<h4>Thematically</h4>
<p>Puzzles sharing a <em>theme</em> or broad <em>way of thinking</em> are often grouped together.</p>
<h4>Gradually</h4>
<p>Puzzles combining <em>ways of thinking</em> are not shown before each <em>way of thinking</em> is presented individually. Simpler  before complex puzzles.</p>
<h4>Sharply</h4>
<p>Sharp changes in <em>ways of thinking</em> may occur between and within <em>themes</em>. Usually a pleasant surprise.</p>

<h3>Any design goals in ${v.TITLE_BOLD()}?</h3>
<h4>Language independence</h4>
<p>Creating a word game without language-dependent content. The vast majority of the levels (22) can be enjoyed anywhere in the world, equally, by anyone who is acquainted with the latin alphabet. ${v.L_DONE()}</p>
<h4>Minimalism</h4>
<p>Making a compelling enigma with minimal interface and decoration. No repeated ideas. ${v.L_DONE()}</p>
<h4>Other</h4>
<p>Extending the ${v.A_GAME_BAR()} to any javascript game. ${v.L_DONE()}</p>
<p>Making sound effects and music. ${v.L_PART()}</p>

<h3>Which level design methods made ${v.TITLE_BOLD()}?</h3>
<h4>Clue-then-mechanic</h4>
<p>A particular word is desired. What is the <b>essence</b> of this word? How could this become a puzzle?</p>
<p>Multiple puzzle iterations.</p>
<h4>Mechanic-then-clue</h4>
<p>A particular mechanic is desired. What <b>letter patterns</b> must be present in the word to ensure a <b>solvable</b> puzzle? How about a <b>good</b> puzzle?</p>
<p>Programmatic word search. Manual curation of words with clue potential. Minor adjustments to word/mechanism until a match is found.</p>
<h4>Theme-centric</h4>
<p>A particular theme is desired. Gather an extensive list of words that cover the theme. Which mechanisms fit with and enable full word list exploration?</p>
<p>Multiple clue and mechanic iterations.</p>
<h4>Feedback-centric</h4>
<p>A finished puzzle is improved and/or totally redesigned after playtester feedback. Possible reasons: too easy (unintended solution), too cryptic (after a fair amount of experimentation), too cumbersome, requiring more visual feedback, unforeseen possibilities, novel ideas, etc...</p>
