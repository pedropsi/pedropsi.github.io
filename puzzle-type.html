<p>Expect the unexpected!</p>


<h2>How to play</h2>
<p>The screen displays only one clue. Your goal is to type this clue <em>exactly</em> as shown. However, your keyboard is behaving cryptically...</p>
<p>All puzzles can be solved with logic, experimentation and creative thinking, sometimes aided by pecil and paper. Solving a puzzle usually requires two steps: discovering which rules are in place, then using these rules to write the clue. Rules don't change nor ever rely on timing, so relax and take your time!</p>
<p>After beating certain puzzles, some people will enjoy replaying them, trying to write even harder clues or simply push the rules to their limits, perhaps even using the interface as a learning device. All levels were designed with this possibility in mind.</p>
<p>If at any point you feel <em>overwhelmed by too many possibilities</em> or like <em>brute-forcing your way</em>, that is a telltale sign you may be missing critical information! The hint symbols below may steer you into the right path again.<p>

<h3>Controls</h3>
<h4>Typing</h4>
<p>Type any of the 26 uppercase letters of the latin alphabet.</p>
<p>Some levels may forbid certain characters, or allow spaces and/or digits.</p>
<p>You may type on your own keyboard or by tapping on the <b>on-screen keyboard</b>. To toggle the <b>on-screen keyboard</b>, press <kbd>Alt</kbd>+<kbd>K</kbd> or <kbd>${ObtainSymbol("keyboard")}</kbd>.</p>

<h4>Undo & redo</h4>
<p>To undo an action, press <kbd>backspace</kbd>, <kbd>delete</kbd>, <kbd>Alt</kbd>+<kbd>Z</kbd> or <kbd>${ObtainSymbol("undo")}</kbd>.</p>
<p>To redo, press <kbd>shift</kbd>+<kbd>backspace</kbd>, <kbd>shift</kbd>+<kbd>delete</kbd> or <kbd>Alt</kbd>+<kbd>Y</kbd> or <kbd>${ObtainSymbol("redo")}</kbd>.</p>

<h3>Graphical conventions</h3>
<h4>Lighter tone characters</h4>
<p>Temporary characters, sometimes coloured in a lighter tone, may be transformed when certain conditions be (or fail to be) met.</p>

<h4>Arrows: ${ObtainSymbol("left")} and ${ObtainSymbol("right")}</h4>
<p>The symbols ${ObtainSymbol("left")} and ${ObtainSymbol("right")} indicate you may press the arrows <kbd>${ObtainSymbol("left")}</kbd> and <kbd>${ObtainSymbol("right")}</kbd>.</p>

<h4>Level difficulty: ${ObtainSymbol("asterisk-heavy")}</h4>
<p>Level difficulty is indicated by the number of ${ObtainSymbol("asterisk-heavy")}, in a scale of 1 (${ObtainSymbol("asterisk-heavy")}: very easy) to 5 (${ObtainSymbol("asterisk-heavy").repeat(5)}: very hard).</p>

<h4>Sound: ${ObtainSymbol("music")}</h4>
<p>Any level where turning on sound will be hintful will be marked with ${ObtainSymbol("music")}.</p>

<h4>Pictograms</h4>
<p>${ObtainSymbol("search")} The magnifying glass symbol means it is probably a good idea to use a search engine, unless you happen to be an expert on the level topic!</p>
<p>${ObtainSymbol("eye")} The eye symbol means the level requires visual/spatial thinking.</p>
<p>${ObtainSymbol("book")} The dictionary symbol means the level requires some knowledge of a particular language (English included). Online dictionaries, translation and word-search tools may be useful.</p>

<h3>System requirements</h3>
<h4>Browsers</h4>
<h5>Desktop</h5>
<p>${v.TITLE_BOLD()} was tested and runs well with the desktop versions of Chrome (78-81.0), iOS Safari (12) Firefox (65.0-74), Opera (65), Brave (1.5) and Edge (80). ${v.L_OK()}</p>
<p>${v.TITLE_BOLD()} does not run on Internet Explorer.</p>

<h5>Mobile</h5>
<p>Although ${v.TITLE_BOLD()} runs on Android Chrome, Android Firefox and iOS Safari (12), the marked slowness would prevent a good game experience. ${v.L_PROBLEM()}</p>

<h4>Screen sizes</h4>
<p>With a physical keyboard, ${v.TITLE_BOLD()} was designed to display well on all screen sizes, from extremely small (e.g 300px by 200px), to very large (e.g. 1280px by 1024px and above). ${v.L_OK()}</p>
<p>Typing with the on-screen keyboard may be cumbersome on very small screens, because the keys become quite small. So this combination 
is not recommended.</p>

<h2>Videoplaytesting tips</h2>

<h3>Setting up the screen</h3>
<p>Your screen should display the game, plus optionally a second window. This second window could be for instance Notepad, Excel or a terminal (e.g. to write letters or calculations), Paint (e.g. to draw schematics), a private browser window (e.g. to search) or any other program you find convenient.</p>
<p>If you wish to display yourself while playing, on the screen's top left corner or anywhere else convenient to you - please resize or move the game or application window would to avoid covering it.</p>

<h3>Recording and editing video</h3>
<p>A popular recording software is ${v.A_OBS()}. In case you need to edit your video after recording, or convert it to another format, ${v.A_KDEN()} is a free and open-source option.</p>

<h3>Uploading playtesting videos</h3>
<p>Playtesting videos may be uploaded for instance to youtube, as <b>unlisted</b>, or to a private folder in the cloud (e.g. google drive, microsoft one drive, etc..).</p>

<h3>Protecting your privacy</h3>
<h4>Private browsing</h4>
<p>Whenever you need to navigate to a page outside the game, opening a new <em>private</em>/<em>incognito</em> tab is recommended to protect your privacy. On <b>Chrome</b> or <b>Opera</b>, press ${KBDHTML("Ctrl")}/${KBDHTML("Ctrl","mac")} + ${KBDHTML("Shift + n")}; on <b>Firefox</b> or <b>Edge</b>, press ${KBDHTML("Ctrl")}/${KBDHTML("Ctrl","mac")} + ${KBDHTML("Shift + p")}; on <b>Brave</b>, press ${KBDHTML("Alt")}/${KBDHTML("Alt","mac")} + ${KBDHTML("Shift n")}.</p>

<h4>Self-recording</h4>
<p>If you do not wish to record yourself on camera for privacy reasons, it is also perfectly acceptable to record your voice only.</p>
<p>If for privacy reasons you are uncomfortable with recording your voice, you'd have to find a way to convey your every thought and emotion as you play - e.g. writing them all on screen (not recommended).</p>

<h2>F.A.Q.</h2>

<h3>To which genre does ${v.TITLE_BOLD()} belong?</h3>
<p>To <b>none</b>! ${v.TITLE_BOLD()} is definitely <b>not a riddle game</b>, because it lacks obscure cultural references, <b>nor a word game</b> as it does not reuse a small set of mechanics on endless word lists. Obviously, <b>not a typing game</b> either, since time does not matter and the keyboard deceives!</p>
<p>Perhaps ${v.TITLE_BOLD()} could be placed nearer the <b>puzzle hunt</b> genre, since it can be seen as a collection of puzzles, each with its own character.</p>

<h3>What inspired ${v.TITLE_BOLD()}?</h3>
<p>${v.TITLE_BOLD()} contains mathematical, language, visual, scientific, programming, geographical, musical and other elements.</p>
<p>With respect to other puzzle games, ${v.MINOTALEN()} keenly observed similarities with ${v.A_DEVILS_CALCULATOR()}, while the interface is as minimal as the one found in ${v.A_NONE()}, a riddle game.</p>

<h3>How are puzzles in ${v.TITLE_BOLD()} ordered?</h3>
<h4>Thematically</h4>
<p>Puzzles sharing a <em>theme</em> or broad <em>way of thinking</em> are often grouped together.</p>
<h4>Gradually</h4>
<p>Puzzles combining <em>ways of thinking</em> are not shown before each <em>way of thinking</em> is presented individually. Simpler  before complex puzzles.</p>
<h4>Sharply</h4>
<p>Sharp changes in <em>ways of thinking</em> may occur between and within <em>themes</em>. Usually a pleasant surprise.</p>

<h3>Any design goals in ${v.TITLE_BOLD()}?</h3>
<h4>Language independence</h4>
<p>Creating a word game without language-dependent content. The vast majority of the levels (22) can be enjoyed anywhere in the world, equally, by anyone who is acquainted with the latin alphabet. ${v.L_DONE()}</p>
<h4>Minimalism</h4>
<p>Making a compelling enigma with minimal interface and decoration. No repeated ideas. ${v.L_DONE()}</p>
<h4>Other</h4>
<p>Extending the ${v.A_GAME_BAR()} to any javascript game. ${v.L_DONE()}</p>
<p>Making sound effects and music. ${v.L_PART()}</p>

<h3>Which level design methods made ${v.TITLE_BOLD()}?</h3>
<h4>Clue-then-mechanic</h4>
<p>A particular word is desired. What is the <b>essence</b> of this word? How could this become a puzzle?</p>
<p>Multiple puzzle iterations.</p>
<h4>Mechanic-then-clue</h4>
<p>A particular mechanic is desired. What <b>letter patterns</b> must be present in the word to ensure a <b>solvable</b> puzzle? How about a <b>good</b> puzzle?</p>
<p>Programmatic word search. Manual curation of words with clue potential. Minor adjustments to word/mechanism until a match is found.</p>
<h4>Theme-centric</h4>
<p>A particular theme is desired. Gather an extensive list of words that cover the theme. Which mechanisms fit with and enable full word list exploration?</p>
<p>Multiple clue and mechanic iterations.</p>
<h4>Feedback-centric</h4>
<p>A finished puzzle is improved and/or totally redesigned after playtester feedback. Possible reasons: too easy (unintended solution), too cryptic (after a fair amount of experimentation), too cumbersome, requiring more visual feedback, unforeseen possibilities, novel ideas, etc...</p>
