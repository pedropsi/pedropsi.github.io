<h2>How to play</h2>
<p>The screen displays only one clue. Your goal is to type this clue <em>exactly</em> as shown. However, your keyboard is behaving cryptically...</p>
<p>All puzzles can be solved with logic, experimentation and creative thinking, sometimes aided by pencil and paper. Solving a puzzle usually requires two steps: discovering which rules are in place, then using these rules to write the clue. Rules don't change nor ever rely on timing, so relax and take your time!</p>
<p>After beating certain puzzles, some people will enjoy replaying them, trying to write even harder clues or simply push the rules to their limits, perhaps even using the interface as a learning device. All levels were designed with this possibility in mind.</p>
<p>If at any point you feel <em>overwhelmed by too many possibilities</em> or like <em>brute-forcing your way</em>, that is a telltale sign you may be missing critical information! The ${A("#pictograms")} below may steer you back to the right path again.<p>

<h3>Controls</h3>
<h4>Typing on a keyboard</h4>
<p>Type any of the 26 letters of the latin alphabet. Some levels may forbid certain characters, or allow spaces, digits and/or arrows.</p>

<h4>Typing on-screen</h4>
<p>To open the translucent <b>on-screen keyboard</b> simply ${KB("tap")} the input area or ${KB("keyboard")}. To close it, press ${KB("keyboard")} again or ${KB("close")}.</p>
<p><b>Tip:</b> ${KB("hold")} on any key for a burst.</p>

<h4>Undo</h4>
<p>To undo an action, press either ${KB("backsp")}, ${KB("delete")}, ${KB("ctrl z")} or ${KB("undo")}.</p>
<p>You may also ${KB("swipe-left")} on the input area.</p>

<h4>Redo</h4>
<p>To redo an undone action, press either ${KB("shift backsp")}, ${KB("shift delete")}, ${KB("ctrl y")} or ${KB("redo")}.</p>
<p>You may also ${KB("swipe-right")} on the input area.</p>

<h4>Restart</h4>
<p>To restart a level, press either ${KB("ctrl backsp")}, ${KB("ctrl delete")}, ${KB("ctrl r")} or ${KB("restart")}.</p>

<h4>Quit to title screen</h4>
<p>To quit a level, and return to the title screen, press ${KB("esc")}.</p>


<h3>Graphical conventions</h3>
<h4>Lighter tone characters</h4>
<p>Temporary characters, sometimes coloured in a lighter tone, may be transformed when certain conditions be (or fail to be) met.</p>

<h4>Arrows</h4>
<p>The arrows ${ObtainSymbol("left")} and ${ObtainSymbol("right")} indicate you may press the arrows ${KB("left")} and ${KB("right")}.</p>

<h4>Level difficulty: ${ObtainSymbol("asterisk-heavy")}</h4>
${HyperText("Difficulty")}

<h4>Pictograms</h4>
<p>${ObtainSymbol("music")} The musical note symbol will appear in any level where turning on sound will be <em>hintful</em>.</p>
<p>${ObtainSymbol("magnifying-glass")} The magnifying glass symbol means it is probably a good idea to use a search engine, unless you happen to be an expert on the level topic!</p>
<p>${ObtainSymbol("eye")} The eye symbol means the level requires visual/spatial thinking. Sometimes it may be a good idea to draw a diagram or a map.</p>
<p>${ObtainSymbol("book")} The dictionary symbol means the level requires some knowledge of a particular language (English included). Online dictionaries, translation and word-search tools may be useful.</p>
<p>${ObtainSymbol("math")} The mathematical symbol suggests it may be advantageous to <em>imagine</em> numbers.</p>
<p>${ObtainSymbol("structure")} The architetural symbol hints that the level may need careful planning before <em>building</em> a solution <em>brick by brick</em>.</p>

<h3>Level navigation</h3>
<h4>Skipping a level</h4>
<p>${KB("swipe-right")} on the level clue area, or press ${KB("ctrl right")}.</p>

<h4>Going back to a previous level</h4>
<p>${KB("swipe-left")} on the level clue area, or press ${KB("ctrl left")}.</p>

<h4>Opening the selector menu</h4>
<p>${KB("tap")} on the level clue area, or press ${v.LEVEL_KEY()}. You may also use the <kbd>Level selector</kbd> button in the game bar.</p>

<h3>System requirements</h3>
<h4>Browsers</h4>
<h5>Desktop</h5>
<p>${v.TITLE_BOLD()} was tested and runs well with the desktop versions of Chrome (78-81.0), iOS Safari (12) Firefox (65.0-74), Opera (65), Brave (1.5) and Edge (80). ${LabelHTML("OK")}</p>
<p>${v.TITLE_BOLD()} does not run on Internet Explorer.</p>

<h5>Mobile</h5>
<p>Although ${v.TITLE_BOLD()} runs on Android Chrome, Android Firefox and iOS Safari (12), the marked slowness would prevent a good game experience. ${LabelHTML("Problem")}</p>

<h4>Screen sizes</h4>
<p>With a physical keyboard, ${v.TITLE_BOLD()} was designed to display well on all screen sizes, from extremely small (e.g 300px by 200px), to very large (e.g. 1280px by 1024px and above). ${LabelHTML("OK")}</p>
<p>Typing with the on-screen keyboard may be cumbersome on very small screens, because the keys become quite small. So this combination 
is not recommended.</p>

<h2>F.A.Q.</h2>

<h3>What type of game is ${v.TITLE_BOLD()}?</h3>
<p>${v.TITLE_BOLD()} is an inductive typing game. Inductive means you must explore to deduce the hidden rules of the system (in each level). Exploration happens through a beautiful and minimalist typing interface.</p>
<p>Thus ${v.TITLE_BOLD()} could be placed near the <b>puzzle hunt</b> genre, since it can be seen as a collection of puzzles, albeit interactive!</p>
<p>So don't be fooled: ${v.TITLE_BOLD()} is <b>not</b> a <em>riddle</em> because it lacks obscure cultural references, <b>nor</b> a <em>word game</em> as it never reuses a base mechanic on long word lists, <b>nor</b> a <em>typing game</em>, since time does not matter and the keyboard deceives!</p>


<h3>What inspired ${v.TITLE_BOLD()}?</h3>
<p>${v.TITLE_BOLD()} contains mathematical, language, visual, scientific, programming, geographical, musical and other elements.</p>
<p>With respect to other puzzle games, ${P("minotalen")} keenly observed similarities with ${v.A_DEVILS_CALCULATOR()}, while the interface is as minimal as the one found in ${v.A_NONE()}, a riddle game.</p>
<p>It shares some ideas with Jeff Wu's ${AHTML("Send a damned message","https://www.wuthejeff.com/send-a-damned-message/")}.</p>

<h3>How are puzzles in ${v.TITLE_BOLD()} ordered?</h3>
<h4>Thematically</h4>
<p>Puzzles sharing a <em>theme</em> or broad <em>way of thinking</em> are often grouped together.</p>
<h4>Gradually</h4>
<p>Puzzles combining <em>ways of thinking</em> are not shown before each <em>way of thinking</em> is presented individually. Simpler  before complex puzzles.</p>
<h4>Sharply</h4>
<p>Sharp changes in <em>ways of thinking</em> may occur between and within <em>themes</em>. Usually a pleasant surprise.</p>

<h3>Any design goals in ${v.TITLE_BOLD()}?</h3>
<h4>Language independence</h4>
<p>Creating a word game without language-dependent content. The vast majority of the levels (22) can be enjoyed anywhere in the world, equally, by anyone who is acquainted with the latin alphabet. ${LabelHTML("Done")}</p>
<h4>Minimalism</h4>
<p>Making a compelling enigma with minimal interface and decoration. No repeated ideas. ${LabelHTML("Done")}</p>
<h4>Other</h4>
<p>Extending the ${A("game-bar")} to any javascript game. ${LabelHTML("Done")}</p>
<p>Making sound effects and music. ${LabelHTML("Partly")}</p>

<h3>Which level design methods made ${v.TITLE_BOLD()}?</h3>
<h4>Clue-then-mechanic</h4>
<p>A particular word is desired. What is the <b>essence</b> of this word? How could this become a puzzle?</p>
<p>Multiple puzzle iterations.</p>
<h4>Mechanic-then-clue</h4>
<p>A particular mechanic is desired. What <b>letter patterns</b> must be present in the word to ensure a <b>solvable</b> puzzle? How about a <b>good</b> puzzle?</p>
<p>Programmatic word search. Manual curation of words with clue potential. Minor adjustments to word/mechanism until a match is found.</p>
<h4>Theme-centric</h4>
<p>A particular theme is desired. Gather an extensive list of words that cover the theme. Which mechanisms fit with and enable full word list exploration?</p>
<p>Multiple clue and mechanic iterations.</p>
<h4>Feedback-centric</h4>
<p>A finished puzzle is improved and/or totally redesigned after playtester feedback. Possible reasons: too easy (unintended solution), too cryptic (after a fair amount of experimentation), too cumbersome, requiring more visual feedback, unforeseen possibilities, novel ideas, etc...</p>
