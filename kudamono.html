<p>To play Kudamono, all you need is pen and paper! Or, if you prefer, the line tool will work on every puzzle, e.g using MSPaint or other image editing software.</p>

<h2>FAQ</h2>
<h3>Why is the puzzle named kudamono?</h3>
<p>kudamono is a japanese word for fruit. It's common for paper puzzles to have names in japanese (e.g Sudoku, Kakuro, etc...) because many were invented in Japan.</p>

<h2>More ideas</h2>
<p>Listed for self-reference or in case anyone wants to make them real earlier. More potential fruit types:</p>
<ul>
	<li>banana - bananas connect to a single point (which is not a banana): ${P("draknek","portponky")};</li>
	<li>tomato - each tomato can pretend to be a fruit (of a different type);</li>
	<li>melon seeds - must be contained inside melon loops: ${P("draknek")};</li>
	<li>pomegranate - pomegranate lines must surround any number of pomegranates without leaving empty space within.</li>
	<li>fruits connecting diagonally (45 degrees): ${P("draknek")};</li>
	<li>pineapple - pineapples connect from the bottom (such a strange fruit): ${P("portponky")}</li>
	<li>coconut - cocunuts float at sea (must have a waterline below and none above);</li>
	<li>etc... </li>
</ul>
