<h3>Player mode</h3>
<h4>Draw lines</h4>
<p> ${KB("drag")} on any grid point, then through an unmarked area to start drawing. Keep dragging, in any cardinal direction, to grow the line.</p>
<p>If you make a mistake, keep dragging, but in the opposite direction, to shrink the line.</p>

<h4>Erase lines</h4>
<p> ${KB("drag")} along any line segment to start erasing. Keep dragging, in any cardinal direction, to erase other lines.</p>
<p>If you make a mistake, simply keep dragging, but in the opposite direction, to prevent erasing a line.</p>

<h4>To editor mode</h4>
<p>Press ${KB("space")} or trigger any of the ${A("#Add fruit")} shortcuts to return to editor mode.</p>

<h3>Editor mode</h3>

<h4>Add fruit</h4>
<p>Pick a fruit quickly with ${KB("wheel-up")}, ${KB("wheel-down")}, or the following keyboard shortcuts:</p>
${DynamicText("KudamonoFruitShortcuts")}

<p> Then ${KB("click")} on an empty cell to add the chosen fruit there. </p>
<p> Starting from an empty cell, ${KB("tapdrag")} to add many fruits at once. Dragging over another fruit will replace it by the new one.</p>

<h4>Remove fruit</h4>
<p> ${KB("click")} on a fruit to remove it.</p>
<p> Starting from a fruit, ${KB("drag")} to remove many fruits at once, irrespective of their type.</p>

<h4>To player mode</h4>
<p>When in editor mode, you can ${KB("rightclick")} to return to player mode.</p>


<h4>Resize the Kudamono board</h4>
<p>To remove the rightmost column of the board, press ${KB("ctrl left")}. To add one column to the right, press ${KB("ctrl right")}.</p> 
<p>To remove the lowest row of the board, press ${KB("ctrl down")}. To add one row to the bottom of the board, press ${KB("ctrl up")}.</p>
<p>Fruits falling outside a trimmed board will reappear on an enlarged board, until the page is reloaded.</p>

<h4>Shift fruits along the Kudamono board</h4>
<p>To shift all fruit on the board one column to the left, press ${KB("shift left")}. To shift it right, ${KB("shift right")}.</p>
<p>One row upwards: ${KB("shift up")}, one row downwards: ${KB("shift down")}.</p>
<p>Fruits shifted to outside the board may be shifted back inside, until the page is reloaded.</p>


<h3>Sharing</h3>
<h4>Toggle monochrome and outlines</h4>
<p>Toggle the black and white mode by pressing ${KB("ctrl b")}.</p> 
<p>Toggle the fruit outlines by pressing ${KB("ctrl shift b")}.</p>
<p>Both options should be useful for printing and sharing images of the puzzles.</p>



<h4>Save a URL of the board</h4>
<p>Press ${KB("ctrl c")} to copy to the clipboard an url encoding the current board satte.</p>

<h4>Save a picture of the board</h4>
<p>Press ${KB("ctrl s")} to download picture of the current board state.</p>



<h2>Design goals in Kudamono</h2>
<h3>Memorable</h3>
<p>The rules in kudamono, as well as the assigned fruit, should be easy to remember, even if dozens of fruits are added.</p>
<h4>Approach</h4>
<ul>
	<li> Related - rules or path shapes should be related to a certain property of the fruit (e.g. cherry: pairs, grape: bunch (all together), blackberry: path resembles brambles, date: path resembles a branch of dates);</li>
	<li> Concise - each rule is described with few words and the example path fits a small 2x2 square;</li>
	<li> Available - each puzzle contains the subset of applicable rules;</li>
	<li> Paired - many rules are paired (e.g grapes and cherries, apples and pears);</li>
</ul>
<p>Early puzzles contained a small rhyme. This was fun but didn't work that well. Other suggestions include adding mnemonics: ${P("escaper")}, changing the symbols to reflect the rules more accurately: ${P("koswara")};</li>

<h3>Learnable</h3>
<p>Kudamono should be easy to learn, even if the puzzles are challenging.</p>
<h4>Approach</h4>
<ul>
	<li> Concise (see above);</li>
	<li> Available (see above);</li>
	<li> Standalone - wherever possible, standalone puzzles containing a single fruit type are produced as tutorials;</li>
	<li> Example - some issue sheets are presented, displaying the different types of errors, on the path to a solved puzzle;</li>
	<li> Feedback - the interactive version of Kudamono highlights errors, alerts on completion, and by way of input excludes some possibilities;</li>
</ul>
<p>Some fruit rules only make complete sense in combination with other fruits, and this steepens the learning curve.</p>

<h3>Systematic</h3>
<p>Kudamono should be a well-thought system. Graphic properties should have consistent meaning:</p>
<ul>
	<li>Line Hue - lines start gray and acquire the colour of the fruit they touch. Touching too many fruits, they become black.</li>
	<li>Line Thickness - lines are thin when planned, and thick when set.</li>
	<li>Line Dashes - a dashed line is either wrong or ready to be erased.</li>
</ul>


<h3>Pleasant</h3>
<p>Kudamono should evoke feelings of happiness, cuteness.</p>
<h4>Approach:</h4>
<ul>
	<li>Fruity- everybody likes some fruit.</li>
	<li>Colourful - graphics use a single colour per fruit.</li>
	<li>Gradual - the more close to completion a level is, the greater the amount of colours on screen/paper.</li>
	<li>Details - some details, like the fruity cursor, are cute.</li>
</ul>

<h3>Multimedia</h3>
<p>Kudamono should be playable on different media. Print a Kudamono and play it with crayons, or load Kudamono on a touchscreen and play with your fingers. Play only with a mouse, or only with a keyboard.</p>
<h4>Approach:</h4>
<ul>
	<li>Silhouettes - each fruit has a distinct silhouette, so it is distinguished even in black and white, for printing.</li>
	<li>Multiple controls</li>
</ul>


<h3>Issues</h3>

<h4>Consistency</h4>
<p>The rules may feel inconsistent or lacking of a "main thing" (apart from the fruits).</p>

<h4>Standalonability</h4>
<p>Some rules do not work standalone, only in combination with other fruits. Newly added fruits will be playable both standalone and in combination.</p>


<h2>FAQ</h2>
<h3>Why is the puzzle named Kudamono?</h3>
<p>Kudamono is a japanese word for fruit. It's common for paper puzzles to have names in japanese (e.g Sudoku, Kakuro, Masyu, etc...) because many were invented in Japan.</p>

<h3>How do the Kudamono rules relate to those in other puzzles?</h3>

<h4>Geisterbahn</h4>
<h5>Similarities</h5>
<p>Both puzzles contain a rich set of rules, a subset of which are picked for each puzzle. Both puzzles present the rules visually, at the start of each puzzle, via a concise, self-descriptive depiction.</p>
<h5>Differences</h5>
<p>While Geisterbahn is about placing numbers, Kudamono is about drawing lines.</p>
<p>In Geisterbahn, it is clear form the start which rules apply to which cells, while in Kudamono, it is important to deduce which cells belong to which line (subject to different rules, when containing different fruits).</p>

<h4>Masyu, Hiking track, and other paper puzzles</h4>
<p>Some of the rules in Kudamono may be similar, either by accident or inspiration, to those in other paper puzzles. As long as the rules are perceived as sufficiently distinct and integrate pleasantly in combination, all is well.</p>
<p>For instance, the <em>Coconut</em> rule may be seen as a simplified form of that of Hiking Track (by ${P("Hempuli")}).</p>
<p>The <em>Blackberry</em> rule was directly inspired by Masyu, and unknowingly became very similar to the <em>Total Masyu</em> variant. If white circles became blackberries, they would lose the ability to form "straight bridges", but would gain the flexibility of multiple loops. Also, some equivalent blackberry/white circle configurations would be impossible without requiring extra black circles at certain spots.</p>

<h4>The Witness / the Witless</h4>
<h5>Similarities</h5>
<p>Both puzzles focus on drawing lines and contain a rich set of rules assigned to different symbols, to be used alone or combined in a single puzzle.</p>
<h5>Differences</h5>
<p>Kudamono rules are explained (no need to infer them). There are generally many interacting paths in a Kudamono puzzle, and no starting circles nor endpoints are explicitly marked. Loops appear prominently in Kudamono. Also, lines go through symbols, rather than around them. Finally, Kudamono is normally restricted to an euclidean grid.</p>

<h4>Bonsai gardening</h4>
<p>This challenging ${AHTML("paper puzzle genre","bonsai.html")} might have been partially inspired by Kudamono.</p>
<h5>Similarities</h5>
<p>Both puzzles focus on drawing lines though symbols, each with different rules.</p>
<h5>Differences</h5>
<p>While a Bonsai path generally contains both fruits and flowers, in Kudamono each path is assigned to only one fruit type. Conversely, there is only one Bonsai path, but multiple Kudamono paths. Finally, bonsai requires the entire grid to be filled, a rule that is absent in Kudamono.</p>
