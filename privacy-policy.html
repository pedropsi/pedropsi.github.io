<p>The ${v.SITE_NAME()} does not collect <em>personal data</em> as defined in ${v.A_GDPR_A4()}, except when you <b>you explicitly choose</b> to communicate it, in which case ${v.A_GDPR()} will be <b>respected</b>.<p>
<p>Moreover, the ${v.SITE_NAME()} is designed to minimise privacy risks. <b>Here's how!</b></p>

<h2>Open-source</h2>
<p>The ${v.SITE_NAME()} is <b>open-source</b>. Do ${AHTML("look at the code",v.SOURCE_URL())} and if you find any privacy breach or concern, ${v.A_LET_ME_KNOW()}.</p>

<h2>Transparent</h2>
<p>Here's the list of third parties the ${v.SITE_NAME()} infrastructure relies on. Their respective privacy policies apply to the extent that they are relied on.</p>

<h3><em>Github Pages (Microsoft)</em></h3>
<p>This site is hosted on <em>Github Pages</em>, owned by <em>Microsoft</em>.</p>

<h3><em>Google</em></h3>
<p>Some site features (form and feedback submission, analytics) are managed by the ${v.SITE_NAME()}'s associated <em>Google</em> account:</p>

<h2>Private Communication</h2>
<p>When you communicate with the ${v.SITE_NAME()}, for instance by email or form submission, this communication is kept <b>private</b>.  
However, it flows through a <em>Google</em> mailbox and drive so it may stay there for archival purposes as long as ${v.SITE_NAME()} runs.</p>

<h2>Email subscriptions</h2>
<p>The same provisions apply as for <b>private communication</b>. Plus, if you subscribe for ${v.SITE_NAME()} emails, the use of your address or any other provided personal data will be restricted to that purpose. All such data is deletable by request, such as when you cancel a subscription.</p> 


<h2>Minimal analytics</h2>
<p>The ${v.SITE_NAME()} collects on each page load a minimal amount of non-personal visitor information (detailed below). 
This information is kept <b>private</b> in a <em>Google</em> account. </p>
<p>If you can suggest how to reach the same purposes while collecting less information, ${v.A_LOVE_TO_KNOW()}!</p>

<h3> on page load </h3>
<table class="top-left">
<thead>
	<tr>
		<th>Data type</th>
		<th>Purpose</th>
	</tr>
</thead>
<tbody>
	<tr>
		<th>language + timezone</th>
		<th>to estimate the geographic distribution of visits.<th>
	</tr>
	<tr>
		<th>date + time + timezone</th>
		<th>to understand which times of the year, month, week and day are more popular. To see how new content is received by the public. </th>
	</tr>
	<tr>
		<th>screen size + user agent</th>
		<th>to know whether the ${v.SITE_NAME()} can be seen perfectly by all visitors. Do ${AHTML("report any bug","contact.html")} you find! </th>
	</tr>
	<tr>
		<th>referrer url hashtag</th>
		<th>to compare the impact of different publicising efforts.<th>
	</tr>
	<tr>
		<th>a randomly generated word</th>
		<th>to aggregate all data belonging the same visitor, across multiple pages.<th>
	</tr>
	</tbody>
</table>

<h3> in-game </h3>
<table class="top-left">
<thead>
	<tr>
		<th>Data type</th>
		<th>Purpose</th>
	</tr>
</thead>
<tbody>
	<tr>
		<th>level tried or beaten</th>
		<th>to know how many players try vs beat the game and thus estimate difficulty.<th>
	</tr>
	<tr>
		<th>level timing</th>
		<th>to understand which levels are harder to beat, and find gameplay bottlenecks.<th>
	</tr>
	<tr>
		<th>move sequence</th>
		<th>to see how many attempts per level are made and whether previously unknown solutions were found.<th>
	</tr>
	<tr>
		<th>hints used (if available)</th>
		<th>to see whether and when players need help.<th>
	</tr>
	<tr>
		<th>player feedback</th>
		<th>to improve the game.<th>
	</tr>
</tbody>
</table>

<h2>Localsaves</h2>
<p>Each game on the ${v.SITE_NAME()} offers the option to localsave, which saves your progress across sessions in the browser's local storage. Although it is <b>on</b> by default, deselecting the localsave button (${KB("save")}) <b>erases the save files</b>.</p>

<h2>More...</h2>
<p><b>Suggestions for improvement of the ${v.SITE_NAME()}'s Privacy are always ${v.A_WELCOME()}!</b></p>
