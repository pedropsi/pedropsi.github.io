<p>Here are some ideas to make the ${v.SITE_NAME()} thrive:</p>

<h2>Contribute</h2>
<h3>Game bar</h3>
<p>Does the ${A("game-bar")} suit your needs? How could it improve? ${v.NAME()} would ${v.A_LOVE_TO_KNOW()}!</p>

<h3>Puzzlescript database</h3>
<p>Found new puzzlescript game? Add it now to ${A("puzzlescript-games-database")} in the blink of an eye.</p>

<h3>Give feedback</h3>
<p>It may be so as simple as to ${v.A_LET_ME_KNOW()} what you think of a particular aspect of the ${v.SITE_NAME()}. What do you really like? How did it make your day better? </p>
<p> Shall something be annoying, out of place or not working, please ${v.A_GET_IN_TOUCH()} so it be fixed sooner.</p>

<h2>Visit the Store</h2>
<p>Some of the things in the ${v.SITE_NAME()} are so polished that they earned a place in the ${A("store")}.</p>

<h2>Collaborate</h2>
<h3>New project</h3>
<p>Do you have an idea for an exciting new project and want to partner? Well, do ${v.A_LET_ME_KNOW()}!</p> 


<h3>Let's do business together...</h3>
<p>Expressions of interest are ${v.A_WELCOME()}.</p>


<h2>Spread the word</h2>
<h3>Share with your friends</h3>
<p>If you like the ${v.SITE_NAME()}, tell your friends about it now! Seeing many people enjoying it boosts ${v.MY()} motivation, which, in turn, may fuel even more interesting projects.</p>

<h3>Share it with the web</h3>
<p>Streaming a video about anything in the ${v.SITE_NAME()}, reviewing some of its content, or just linking to a page, perhaps in a forum, in your blog or collection is always welcomed.</p>
<p> Use the ${A("press kit")} as a convenient starting point.</p>

<h2>Other ideas?</h2>
<p>Great - ${v.A_DROP_ME_A_LINE()}.</p>
