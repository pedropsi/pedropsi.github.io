<script id="post">var Post={POST:()=>`

<h2>What is ${v.TITLE_BOLD()}?</h2>
<p>${v.TITLE_BOLD()} is a <b>browser add-on</b>. <a href="${v.CONTENT()}" ${v.BLANK()}>Get it here!</a></p>
<p>It sets a different homepage every day, by cycling through a list of pages of your choice. Up to 31 homepages can be listed, one for each day of the month. If the list contains fewer pages, one simply counts from the first page again.</p>

<h2>You need ${v.TITLE_BOLD()} if you...</h2>
<ul>
<li>love to read newspapers, but have limited time and you'd like to read different ones on different days of the week. Now you can <b>keep your balance!</b></li> 
<li>follow weekly magazines, and need to structure your reading. Now you can <b>be more organized!</b></li> 
<li>check, at least once a month, blogs and other pages that update rarely. Now you can <b>forget no more!</b></li> 
<li>want to keep tabs on particular friends' pages or acquaintances regularly. Now you can <b>be a better person!</b></li>
</ul> 
<p>So what are you waiting for? <a href="${v.CONTENT()}" ${v.BLANK()}>Try it!</a></p>

<h2>How to use ${v.TITLE_BOLD()}?</h2>
<p>Easily! Just <em>list your choices</em> (in the options menu, in the browser add-ons page), <em>hit save</em> and you're good to go!</p>

${v.FIGURE_SIMPLE()}

<h2>Any new features planned?</h2>
<p>A <b>yearly</b> page calendar may be added. Possibly an option to <em>load bookmarks directly into the homepage list</em>. Perhaps <b>intra-day</b> page changes options. Please ${v.A_CONTACT_ME()} if you think those would be good ideas or you'd like to suggest something else.</p>

<h2>Which browsers are currently supported?</h2>
<p>At the moment, only <b>Firefox</b>. Please ${v.A_CONTACT_ME()} if you'd like to see ${v.TITLE_BOLD()} in your favourite browser.</p>

<h2>F.A.Q.</h2>
<h3>Why did ${v.NAME()} create ${v.TITLE_BOLD()}?</h3>
<p>${v.NAME()} wanted to read news in different languages in different days, for practice. No similar extension was found, thus ${v.TITLE_BOLD()} was born.</p>
<h3>How long did it take to make ${v.TITLE_BOLD()}?</h3>
<p>Altogether, including writing this answer, about 9 hours. Thanks to ${v.A_MATERIAL_ICONS()}.</p>
<h3>Is this ${v.NAME()}'s first extension?</h3>
<p>Yes.</p>
