<h2>Workflow</h2>

<h3>Setting up the screen</h3>
<p>Your screen should display the game, plus optionally a second window. This second window could be for instance Notepad, Excel or a terminal (e.g. to write letters or calculations), Paint (e.g. to draw schematics), a private browser window (e.g. to search) or any other program you find convenient.</p>
<p>If you wish to later display yourself while playing (e.g on the screen's top left corner) - please leave some space by moving or resizing the other windows or these would be covered!</p>

<h3>Recording and editing video</h3>
<p>A popular recording software is ${v.A_OBS()}. In case you need to edit your video after recording, or convert it to another format, ${v.A_KDEN()} is a free and open-source option.</p>

<h3>Uploading playtesting videos</h3>
<p>Playtesting videos may be uploaded for instance to youtube, as <b>unlisted</b>, or to a private folder in the cloud (e.g. google drive, microsoft one drive, etc..).</p>


<h2>Protecting your privacy</h2>
<h3>Private browsing</h3>
<p>Whenever you need to navigate to a page outside the game, opening a new <em>private</em>/<em>incognito</em> tab is recommended to protect your privacy. On <b>Chrome</b> or <b>Opera</b>, press ${KBDHTML("Ctrl")}/${KBDHTML("Ctrl","mac")} + ${KBDHTML("Shift + n")}; on <b>Firefox</b> or <b>Edge</b>, press ${KBDHTML("Ctrl")}/${KBDHTML("Ctrl","mac")} + ${KBDHTML("Shift + p")}; on <b>Brave</b>, press ${KBDHTML("Alt")}/${KBDHTML("Alt","mac")} + ${KBDHTML("Shift n")}.</p>

<h3>Self-recording</h3>
<p>If you do not wish to record yourself on camera for privacy reasons, it is also perfectly acceptable to record your voice only.</p>
<p>If for privacy reasons you are uncomfortable with recording your voice, you'd have to find a way to convey your every thought and emotion as you play - e.g. writing them all on screen (not recommended).</p>
