<h2>Star battle geometric gallery</h2>
<p>Here you'll find star battles in different geometries: triangular, penrose and hyperbolic star battles, folding cubes and icosahedrons (star battle in space), polar coordinates (polar star battle) and even a möbius strip (möbius star battle).</p>
<p>The puzzles have different difficulties. Some are easier (one star) and others slightly harder (two star).</p>
