<p>Geometric star battles include triangular, penrose, Amman-beenker and hyperbolic tilings of the plane, star battle in polar corrdinates (polar star battle) and in three dimensions, folding cubes, icosahedron, and möbius strip (star battles in space)!</p>
<p>The puzzles come in varying difficulties. One star puzzles tend to be easier, and two star puzzles a bit harder, but not always!</p>
<p>Choose between old-school ${AHTML("#Paper star battles")}, and the newest ${AHTML("#Interactive star battles")}.</p>

<h2>Paper star battles</h2>
<p>To play these, all you need is pen and paper! Or, if you prefer, the flood-fill tool will work on every puzzle, e.g using MSPaint or other image editing software.</p>
<p>Shall a star battle be named <em>in space</em>, then part of the challenge is <b>folding the puzzle</b> either in your head or an actual paper version.</p>

<h3>Controls</h3>
<h4>Placing stars</h4>
<p>To place a star, ${KB("click")} on an empty cell.</p>
<p>To remove a star, ${KB("click")} on it. ${KB("drag")} around to remove many.</p>

<h4>Placing marks</h4>
<p>To place a mark, ${KB("rightclick")} on an empty cell. Drag around to place many marks.</p>
<p>To remove a mark, ${KB("rightclick")} on it. ${KB("rightdrag")} around to remove many.</p>

<h4>Panning</h4>
<p>Use the the ${KB("middle mouse button")} to scroll. The position of the mouse around the center determines the direction of rotation.</p>
<p>You may also pan with the ${HyperText("ArrowKeys/Arrows")}.</p>


<h4>Checking for errors</h4>
<p>To check for errors press ${KB("E")}: the regions will become white (correct number of stars), red (too many stars) or blue (missing stars).</p>
<p>To return to the puzzle, press ${KB("R")}.</p>


<h4>Editing & Advanced</h4>
<p>Open the options menu by pressing ${KB("v")}. You can use this to make your own puzzles and edit the geometry!

<h2>Star battle rules</h2>
<h3>Standard star battle puzzles</h3>
<p>In standard star battle puzzles, you must deduce which cells in the (square) grid to place a star on, so that every line and region have a set number of stars (1 star: easy, 2 stars: medium, more stars: hard). Importantly, no two stars may touch each other diagonally, because they may not share vertices.</p>

<h3>Geometric star battle puzzles</h3>
<p>In star battle puzzles using different geometries, the rules are identical. However, lines may bend or wrap-around, there may be more than two lines per cell, and the number of cells per vertex / vertices per cell may differ, even locally.</p>
<ul>
	<li>Planar square grid: <b>2</b> lines per cell, <b>(1, 2 or) 4</b> cells per vertex, <b>(3, 5 or) 8</b> adjacent cells.</li>
	<li>Cube square grid: <b>3</b> lines per cell, <b>3 or 4</b> cells per vertex, <b>7 or 8</b> adjacent cells.</li>
	<li>Planar triangular grid: <b>3</b> lines per cell, <b>(2, 3 or) 6</b> cells per vertex, <b>(6, 7 or) 12</b> adjacent cells.</li>
	<li>Planar Penrose grid: <b>2</b> lines per cell, <b>3 to 5 (?)</b> cells per vertex, <b>8 to 11 (?)</b> adjacent cells.</li>
	<li>Planar Amman-Beenker grid: <b>2</b> lines per cell, <b>(...) 3 to 8</b> cells per vertex, <b>(...) 8 to 12</b> adjacent cells.</li>
</ul>


<h2>How to make geometric star battle puzzles</h2>
<p>You found an interesting grid geometry for a star battle puzzle, but how do you make a puzzle?</p>
<p>At least two approaches can be distinguished, named <b>forward</b> or <b>backward</b> design. The forward approach should generate better puzzles, while the backward approach is sometimes easier.</p>
<p>Finally, you'll need some ${AHTML("#tools")} to save you time!</p>

<h3>Forward design approach</h3>
<p>Here the focus is on particular deductions. So it is useful to have a list of interesting local region configurations in your mind.</p>

<h4>Splitting method</h4>
<p>You split one of the grid regions in a way that the two parts have a fixed number of stars. Iterate.</p>

<h3>Backward design approach</h3>
<p>The backward approach starts with the solution and attempts to make a puzzle around it. Thus, there are two steps: 1) finding a <em>constellation</em> and 2) drawing a set of <em>regions</em> with a unique solution.</p>

<p>Let <b>r</b> be the number of <em>regions</em> and <b>n</b> the number of stars per <em>region</em>. In total you'll need <b>s = r * n</b> stars.</p>

<h4>Finding a <em>constellation</em></h4>
<p>Finding a star battle <em>constellation</em> means  filling the grid with a set of <b>s</b> stars such that no starred cells share any vertices, and no more than <b>n</b> stars per <em>line</em>.</p>
<p>Different geometries impose different rules on which vertices are shared, and on what constitutes a <em>line</em>.</p> 

<p>First ensure the grid is not too small, so that it is not impossible to find a <em>constellation</em>. Start by counting <b>s</b>, the total required number of stars. Then notice how many cells are adjacent to each cell (there may be a couple different cases at the grid boundary), and try to discount any overlaps. Do <b>s</b> stars fit the grid? If not, keep enlarging the grid by one unit until they fit.</p> 

<p>Then, with a grid in place, the following two imperfect methods are are sometimes useful for finding a <em>constellation</em>.</p>

<h5>Symmetry method</h5>
<p>Usually the grids have some symmetries that can be used. For instance, shall there be a <em>m</em>-fold rotational symmetry around a central point, often you can place a <em>starting star</em> anywhere away from the center, and then place <em>m - 1 copies</em> at the symmetric points.</p>

<h5>Knight's method</h5>
<p>Place a <em>starting star</em> anywhere, and mark a <em>ring</em> of all its adjacent cells. Then place a second star outside and adjacent to the ring, as close to the <em>starting star</em> as possible, but on a different line. In a square grid, the second star is now a "knight's move" away.</p> 
<p>Place more stars following the same pattern, until either you <b>wrap-around a boundary</b> and finish the <em>constellation</em> or you <b>must stop</b>.</p> 

<p>If you <b>must stop</b>, try to place a secondary <em>starting star</em> also adjacent to the <em>rings</em> of the primary <em>starting star</em>, and continue the method.</p>



<h4>Drawing <em>regions</em>, while ensuring unique solutions</h4>
<p>Finding a valid <em>constellation</em> is relatively easy, and with a single <em>constellation</em> you can make a huge number of star battle puzzles, by drawing different sets of regions.</p>
<p> However, ensuring that the puzzle has a unique solution can be very time consuming, Here's one method.</p>

<h5>Nucleation Method</h5>
<ol>
	<li>Place a valid <em>constellation</em> on the grid, with r * n stars.</li>
	<li>Draw r-1 small uninteresting <em>regions</em> to confine n*(r-1) stars, and name these <em>regions</em> crystals. Thus only n stars remain outside any crystal, in open territory. </li>
	<li>The smaller the initial crystals you pick, the easier it is to verify uniqueness. So change the crystals manually now until you ensure a unique solution. Then, in the last step, you'll transform a boring unique solution into an interesting unique solution. </li>
	<li>Pick one of the r-1 crystals. Grow it by one new cell into open territory where you can quickly check that no star from the crystal could be moved to the new cell (i.e., the new solution is still unique). Repeat this step until you're happy.</li>
</ol>
