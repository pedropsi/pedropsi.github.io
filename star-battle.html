<h2>Star battle geometric gallery</h2>
<p>Here you'll find star battles in different geometries: triangular, penrose and hyperbolic star battles, folding cubes and icosahedrons (star battle in space), polar coordinates (polar star battle) and even a möbius strip (möbius star battle).</p>
<p>The puzzles have different difficulties. Some are easier (one star) and others slightly harder (two star).</p>

<h2>Idea overflow</h2>
<p>Many ideas failed to produce interesting puzzles, or would require more time to explore. They're left here in case anyone wants to take them forward.</p>
<ul>
	<li>log spiral grid - current 2 star constellation with too many stars, possibly tedious;</li>
	<li>liar star battle - where exactly one of the regions contains no stars;</li>
	<li>starrykabe - the location of the stars is actually the starting point for a nurikabe puzzle (the number assignment would be based either on order of placement of stars ot their coordinates);</li>
