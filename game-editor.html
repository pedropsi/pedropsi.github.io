<h2>About the ${v.TITLE_BOLD()}</h2>

<p>This is a convenient ${v.TITLE_BOLD()} to test any game in the ${AHTML("puzzlescript-games-database")} with ${v.A_GAME_BAR()} <b>right now</b>!</p>
<p>It even loads the <b>appropriate Puzzlescript fork</b> if mentioned in the <code>readme.txt</code> gist file.</p>

<h3>How to load a puzzlescript game to the console</h3>
<p>the ${v.TITLE_BOLD()}'s dropdown search menu lets you pick all currently playable entries in the ${AHTML("puzzlescript-games-database")} (i.e. those containing a puzzlescript link).</p>
<p>For games not currently listed, please add them now to the ${AHTML("puzzlescript-games-database")}, which will make them immediately available to the console. Otherwise, you may also replace the game's PUZZLESCRIPT_ID with your game's puzzlescript ID at the end of the following URL: <code>${v.SITE()}/${v.LINK()}.html?game=PUZZLESCRIPT_ID</code>.</p>

<h3>Hall of fame</h3>
<p>Once you beat any current game in the ${v.TITLE_BOLD()}, you'll be invited to enter the ${AHTML("Global hall of Fame","hall-of-fame-global.html")}! As soon as you pass the final credits screen after winning, you'll be able to type your name in a new window. Make sure you are connected to the internet, then <em>press Submit</em> to be <b>remembered forever</b> or <em>close the window</em> to <b>forsake your glory</b>.</p>

<h2>Known issues</h2>
<h3>Sharing saved game progression</h3>
<p>Game progression within the ${v.TITLE_BOLD()} is not (currently) shared with the original game page. For the time being, please imagine two different game cartridges. Thanks ${v.JCMILLER()} for reporting.</p>

<h3>Game update delays</h3>
<p>Games playable with the ${v.TITLE_BOLD()} sync with the most up-to-date gist, but if you have played a previous version of the game, this version may occasionally be cached. If the problem persists, clearing the site cache may be required.  Thanks ${v.NCRECC()} for reporting.</p>

<h2>FAQ</h2>
<h3> What is a puzzlescript id?</h3>
<p>It's the long identifier after <code>puzzlescript.net/play.html?p=</code> or after <code>puzzlescript.net/editor.html?hack=</code>.</p>

<h3>Changing the Puzzlescript fork</h3>
<p> In case the fork name is mentioned in the gist readme.txt file, e.g. <code>... pasting the script in  ...<b>name</b>.github.io/...</code>, it will be loaded automatically.</p>
<p> Alternatively, you may force a specific fork by adding the URL parameter <code>"&fork=<b>FORK_AUTHOR_NAME_IN_GITHUB</b>"</code> to the console's url. As long as the fork is on Github, and keeps the original folder structure (no new or renamed js files), it should work.</p>

<h3>Linking directly to a level</h3>
<p> You may link directly to a specific level by adding the URL parameter <code>"&level=<b>LEVEL_NUMBER</b>"</code> to the console's url, e.g. ${AHTML("abxtract-tractx.html?level=7","abxtract-tractx.html?level=6")}. In special cases, using the level's name may also work: ${AHTML("skilleblokker.html?level=krok","skilleblokker.html?level=krok")}.</p>


<h3> Why is this game bar slightly different from the published version?</h3>
<p>Because this is the cutting-edge, sometimes experimental, version!</p>

<h3>Who may link to a game played in this page?</h3>
<p> If you are the game author or obtained permission from the author, you may. Otherwise, please be kind and use instead the original links the authors provided, which help them monitor game traction and possibly boost their revenue.</p>
<p>If you really think a game should be played with the game bar, try to persuade the authors to add ${v.A_GAME_BAR()} to their own game page.</p>

<h2>Legal info</h2>
<h3>Particular games</h3>
<p>All games playable in the ${v.TITLE()} are loaded in real time from a public github gist shared by the author, and not directly hosted nor verified by ${v.SITE_NAME()}. Also, if you are an author and want your game manually excluded from the ${v.TITLE()}, please ${v.A_REQUEST_IT()}. </p>

<h3>Puzzlescript</h3>
<p>${v.A_PUZZLESCRIPT()} is under this ${v.A_LICENSE_PUZZLESCRIPT()}.</p>
