<h2>Pattern gallery</h2>
<p>These patterns can be used as wallpaper. From time to time, a new one may appear.</p>

<h3>Old world patterns</h3>
<p>A collection of old patterns from around the world, redrawn by ${v.NAME()}.</p>
${FolderGalleryHTML({
	"viking-carpet":{LEGEND:`
		<p>Over a dark red background, golden patterns: diagonal lines of geometric cereal surrounding either an eight petal flower, or a diamond with four squares inside. The cereal lines would meet at a cross. This pattern was found on a viking carpet on display at ${v.A_FOLKEMUSEUM()}.
	`},
	"fleur-de-lis":{LEGEND:`
		<p>A wall of golden Fleur-de-lis over a dark navy background, as found in a fresco inside one of the rooms of the ${v.A_UFFIZI()} in Firenze.</p>
	`},
	"veronese":{LEGEND:`
		<p>A complex pattern from a fresco at the top floor of one of the towers in ${v.A_CASTELVECCHIO()}.</p>
		<p>A diagonal tricoloured band (green, light red and ochre), each band composed of a series of square plazas containing a central circle with an eight-flower motif. Both the squares and the bands are separated by a network of perpendicular dark rows, on each segment four six-pointed stars. At each intersection stands a fourfold leaf pattern.</p>
	`}
},"mosaic")}

<h3>Original patterns</h3>
<p>These patterns were created anew.</p>
${FolderGalleryHTML({
	"scales":{LEGEND:`
		<p>A subtle pattern created by rearranging the petals of the logo of the ${v.SITE_NAME()} into a shape resembling scales. Most colour was washed out, so that light yellow, green, turquoise, light blues and dark blues are barely visible behind the gray.</p>`
	}
},"mosaic")}

`};</script><script src="data/page.js"></script>
